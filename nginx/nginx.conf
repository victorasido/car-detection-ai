# ============================================================
# nginx/nginx.conf — Vehicle Inspect Platform (Production)
# ============================================================
# SETUP INSTRUCTIONS:
#
# 1. Replace "yourdomain.com" with your actual domain everywhere.
# 2. First-time certificate issuance (HTTP-only mode):
#    Comment out the HTTPS server block, run certbot, then uncomment.
# 3. After cert issuance, this config handles auto-redirect HTTP → HTTPS.
# ============================================================

# Optimize worker connections
upstream backend {
    server backend:8000;
    keepalive 32;
}

# ── HTTP Server: Only for ACME challenge + redirect to HTTPS ────
server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    # Let's Encrypt / Certbot ACME challenge endpoint
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS Server: Main production server ────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name yourdomain.com www.yourdomain.com;

    # ── SSL Certificates (Let's Encrypt via Certbot) ────────────
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    # ── SSL Hardening ────────────────────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_timeout       1d;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_tickets       off;

    # ── Security Headers ─────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "no-referrer-when-downgrade" always;

    # ── Upload Size Limit (match backend config) ─────────────────
    client_max_body_size 500m;

    # ── Timeouts (critical for long video uploads/AI inference) ──
    proxy_connect_timeout  60s;
    proxy_send_timeout     300s;
    proxy_read_timeout     300s;
    send_timeout           300s;

    # ── FastAPI Backend Proxy ────────────────────────────────────
    location /api/ {
        # Strip /api prefix before forwarding to FastAPI
        rewrite ^/api(/.*)$ $1 break;

        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
    }

    # ── API root (no prefix stripping) ──────────────────────────
    location / {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
    }

    # ── Swagger UI static assets (served by FastAPI) ─────────────
    location /docs {
        # Optional: restrict Swagger access to internal IPs in production
        # allow 10.0.0.0/8;
        # deny all;
        proxy_pass       http://backend;
        proxy_set_header Host $host;
    }

    # ── Health Check (no logging to reduce noise) ────────────────
    location /health {
        proxy_pass           http://backend;
        access_log           off;
        proxy_set_header     Host $host;
    }
}
