version: "3.9"

# ── Vehicle Inspection Platform — Production Docker Compose ──────
#
# PURPOSE:
#   Runs ONLY the application services (backend + nginx reverse proxy).
#   - PostgreSQL is hosted externally (RDS / Supabase / Neon)
#   - Object Storage is hosted externally (AWS S3 / Cloudflare R2)
#   - SSL/HTTPS is terminated by Nginx + Let's Encrypt (Certbot)
#
# USAGE:
#   docker-compose -f docker-compose.prod.yml --env-file .env.production up -d --build
#
# FIRST-TIME SSL SETUP (run once, before starting the stack):
#   docker run --rm -v certbot-certs:/etc/letsencrypt -v certbot-webroot:/var/www/certbot \
#     certbot/certbot certonly --webroot -w /var/www/certbot \
#     -d yourdomain.com -d www.yourdomain.com --email you@email.com --agree-tos

services:

  # ── Backend: FastAPI ──────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend.prod
    container_name: vehicleinspect-backend
    expose:
      - "8000"  # Only exposed to the nginx internal network, NOT to the host
    environment:
      # ── OpenAI & AI Pipeline ──────────────────────────────────
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANALYSIS_BACKEND=${ANALYSIS_BACKEND}

      # ── Database (Managed PostgreSQL) ─────────────────────────
      - POSTGRES_DSN=${POSTGRES_DSN}

      # ── Object Storage (S3 / R2) ──────────────────────────────
      - STORAGE_PROVIDER=${STORAGE_PROVIDER:-r2}
      - STORAGE_ACCESS_KEY=${STORAGE_ACCESS_KEY}
      - STORAGE_SECRET_KEY=${STORAGE_SECRET_KEY}
      - STORAGE_BUCKET=${STORAGE_BUCKET}
      - STORAGE_ENDPOINT=${STORAGE_ENDPOINT}
      - STORAGE_REGION=${STORAGE_REGION:-auto}
      - STORAGE_CDN_BASE_URL=${STORAGE_CDN_BASE_URL}

      # ── Security & Feature Flags ───────────────────────────────
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - RATE_LIMIT=${RATE_LIMIT:-60/minute}
      - MAX_UPLOAD_SIZE_MB=${MAX_UPLOAD_SIZE_MB:-200}
      - MAX_VIDEO_DURATION_SEC=${MAX_VIDEO_DURATION_SEC:-600}
      - DATASET_SAVING=${DATASET_SAVING:-true}
      - EXTRACT_N_FRAMES=${EXTRACT_N_FRAMES:-5}
      - TOP_K_FRAMES=${TOP_K_FRAMES:-3}

    volumes:
      # No source mounts in production — everything is baked into the image
      - /tmp/uploads:/tmp  # Temp storage for file uploads
    networks:
      - app_network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s  # Extended for CLIP model load time
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G

  # ── Redis: Message Broker & Cache ────────────────────────
  redis:
    image: redis:7-alpine
    container_name: vehicleinspect-redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - app_network
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Backend Worker: Celery ──────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile.backend.prod
    container_name: vehicleinspect-worker
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANALYSIS_BACKEND=${ANALYSIS_BACKEND}
      - POSTGRES_DSN=${POSTGRES_DSN}
      - STORAGE_PROVIDER=${STORAGE_PROVIDER:-r2}
      - STORAGE_ACCESS_KEY=${STORAGE_ACCESS_KEY}
      - STORAGE_SECRET_KEY=${STORAGE_SECRET_KEY}
      - STORAGE_BUCKET=${STORAGE_BUCKET}
      - STORAGE_ENDPOINT=${STORAGE_ENDPOINT}
      - STORAGE_REGION=${STORAGE_REGION:-auto}
      - REDIS_URL=redis://redis:6379/0
      - EXTRACT_N_FRAMES=${EXTRACT_N_FRAMES:-5}
      - TOP_K_FRAMES=${TOP_K_FRAMES:-3}
    networks:
      - app_network
    command: ["celery", "-A", "app.inspection.celery_app.celery_app", "worker", "--loglevel=info", "--pool=threads", "--concurrency=4"]
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    restart: always

  # ── Nginx: Reverse Proxy + SSL Termination ────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: vehicleinspect-nginx
    ports:
      - "80:80"    # HTTP (redirect to HTTPS)
      - "443:443"  # HTTPS (SSL terminated here)
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-certs:/etc/letsencrypt:ro
      - certbot-webroot:/var/www/certbot:ro
    networks:
      - app_network
    depends_on:
      backend:
        condition: service_healthy
    restart: always

  # ── Certbot: SSL Certificate Auto-Renewal ─────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: vehicleinspect-certbot
    volumes:
      - certbot-certs:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    # Renews every 12 hours; certbot only acts when cert is < 30 days from expiry
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped


# ── Networks ──────────────────────────────────────────────────────
networks:
  app_network:
    driver: bridge

# ── Volumes ───────────────────────────────────────────────────────
volumes:
  certbot-certs:   # Let's Encrypt SSL certificates
  certbot-webroot: # ACME challenge files for certificate issuance/renewal
  redis_data:      # Redis persistent storage
